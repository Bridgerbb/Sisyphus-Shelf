{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card bg-dark text-white shadow border-secondary p-4">
            <h2 class="fw-bold mb-3 text-center">Create Account</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-info w-100 fw-bold mt-2">Register</button>
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-info">Log in here</a>.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
