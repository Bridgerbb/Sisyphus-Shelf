{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8 col-md-10">
        
        <div class="mb-4 text-center">
            <h1 class="display-6 fw-bold">Add to Shelf</h1>
            <p class="text-muted">Log a new book, movie, or game into your backlog.</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <form action="#" method="POST">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-12 mb-2">
                            <label for="title" class="form-label fw-bold">Title</label>
                            <input type="text" class="form-control" id="title" placeholder="e.g., The Lord of the Rings" required>
                        </div>

                        <div class="col-md-12 mb-2">
                            <label for="creator" class="form-label fw-bold">Creator (Author, Director, Studio)</label>
                            <input type="text" class="form-control" id="creator" placeholder="e.g., J.R.R. Tolkien" required>
                        </div>

                        <div class="col-md-6 mb-2">
                            <label for="mediaType" class="form-label fw-bold">Media Type</label>
                            <select class="form-select" id="mediaType">
                                <option value="book">📖 Book</option>
                                <option value="movie">🎬 Movie</option>
                                <option value="game">🎮 Game</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-2">
                            <label for="status" class="form-label fw-bold">Current Status</label>
                            <select class="form-select" id="status">
                                <option value="backlog">Backlog</option>
                                <option value="in-progress">In-Progress</option>
                                <option value="finished">Finished</option>
                            </select>
                        </div>

                        <div class="col-md-12 mb-2">
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" role="switch" id="priorityFlag">
                                <label class="form-check-label fw-bold text-danger" for="priorityFlag">
                                    🔥 Mark as High Priority (Next Up)
                                </label>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3 mt-4">
                            <label for="notes" class="form-label fw-bold">Personal Notes</label>
                            <textarea class="form-control" id="notes" rows="3" placeholder="Why do you want to play/read/watch this?"></textarea>
                        </div>

                        <div class="col-12 mt-4 d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'pile' %}" class="btn btn-light px-4 border">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5">Save to Shelf</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
