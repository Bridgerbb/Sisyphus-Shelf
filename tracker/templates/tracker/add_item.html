{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8 col-md-10">
        
        <div class="mb-4 text-center">
            <h1 class="display-6 fw-bold">Add to Shelf</h1>
            <p class="text-muted">Log a new book, movie, or game into your backlog.</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <form action="{% url 'add_item' %}" method="POST">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-12 mb-2">
                            <label class="form-label fw-bold">Title</label>
                            {{ form.title }}
                        </div>

                        <div class="col-md-12 mb-2">
                            <label class="form-label fw-bold">Creator (Author, Director, Studio)</label>
                            {{ form.creator }}
                        </div>

                        <div class="col-md-6 mb-2">
                            <label class="form-label fw-bold">📺 Media Type</label>
                            {{ form.media_type }}
                        </div>

                        <div class="col-md-6 mb-2">
                            <label class="form-label fw-bold">⏳ Current Status</label>
                            {{ form.status }}
                        </div>

                        <div class="col-md-12 mb-2">
                            <label class="form-label fw-bold">⭐ Rating</label>
                            {{ form.rating }}
                        </div>

                        <div class="col-md-12 mb-2">
                            <div class="form-check form-switch mt-2">
                                {{ form.priority_flag }}
                                <label class="form-check-label fw-bold text-danger" for="{{ form.priority_flag.id_for_label }}">
                                    🔥 Mark as High Priority (Next Up)
                                </label>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3 mt-4">
                            <label class="form-label fw-bold">📝 Personal Notes</label>
                            {{ form.notes }}
                        </div>

                        <div class="col-12 mt-4 d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'pile' %}" class="btn btn-light px-4 border">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5">Save to Shelf</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
