{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisyphus's Shelf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000; 
            background-image: url('{% block bg_image %}{% static "tracker/Continuous.gif" %}{% endblock %}');
            background-size: 45%; 
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff; 
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65); 
            backdrop-filter: blur(3.25px); 
            z-index: -1; 
        }

        main {
            padding: 30px 0; 
        }

        .text-muted, .text-secondary {
            color: #ffffff !important; 
        }

        .card, .list-group-item {
            background-color: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        .table {
            background-color: transparent !important;
            color: #ffffff !important;
        }
        
        th, td { 
            color: #ffffff !important; 
            background-color: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important; 
        }

        .form-control, .form-select {
            background-color: rgba(0, 0, 0, 0.4) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            color: #ffffff !important; 
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(0, 0, 0, 0.6) !important; 
            border-color: rgba(255, 255, 255, 0.5) !important; 
            color: #ffffff !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.1) !important; 
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        option {
            background-color: #212529; 
            color: #ffffff;
        }

        .bg-light, .bg-white {
            background-color: rgba(0, 0, 0, 0.4) !important;
            color: #ffffff !important;
        }
        
        
        .btn-light, .btn-outline-light {
            background-color: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        .btn-light:hover, .btn-outline-light:hover {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <div class="background-overlay"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">🪨 Sisyphus's Shelf</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pile' %}">The Pile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'add_item' %}">Add to Shelf</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto shadow-lg">
        <div class="container">
            <p class="mb-0">© 2026 Sisyphus's Shelf | Beating Tsundoku one item at a time.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
