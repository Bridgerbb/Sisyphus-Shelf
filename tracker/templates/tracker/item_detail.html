{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8">
        
        <div class="mb-4">
            <a href="{% url 'pile' %}" class="text-decoration-none text-muted">
                &larr; Back to The Pile
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-start">
                <div>
                    <span class="badge bg-secondary mb-2">📖 Book</span>
                    <h1 class="display-6 fw-bold mb-0">Dune</h1>
                    <p class="text-muted fs-5 mt-1">By Frank Herbert</p>
                </div>
                <span class="badge bg-warning text-dark fs-6 px-3 py-2">Backlog</span>
            </div>

            <div class="card-body px-4 pb-4">
                <hr class="text-muted opacity-25 mb-4">

                <div class="row">
                    <div class="col-md-4 mb-4">
                        <h6 class="fw-bold text-uppercase text-muted small">Personal Rating</h6>
                        <div class="d-flex align-items-center">
                            <h2 class="mb-0 fw-bold me-2">--</h2> 
                            <span class="text-muted fs-5">/ 5</span>
                        </div>
                        <small class="text-muted fst-italic">Not yet rated</small>
                    </div>

                    <div class="col-md-8 mb-4">
                        <h6 class="fw-bold text-uppercase text-muted small">Details</h6>
                        <ul class="list-unstyled mb-0">
                            <li class="mb-2"><strong>Added on:</strong> March 25, 2026</li>
                            <li class="mb-2"><strong>Priority:</strong> <span class="badge bg-danger">🔥 High (Next Up)</span></li>
                        </ul>
                    </div>
                </div>

                <div class="mb-4">
                    <h6 class="fw-bold text-uppercase text-muted small mb-2">Personal Notes</h6>
                    <div class="p-3 bg-light rounded border">
                        <p class="mb-0 text-muted fst-italic">No notes added yet. Time to start reading!</p>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-5">
                    <button class="btn btn-outline-danger px-4">Delete Item</button>
                    <button class="btn btn-primary px-5">Edit Details</button>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
