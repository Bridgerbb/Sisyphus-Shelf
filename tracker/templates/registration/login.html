{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card glass-card shadow border-secondary p-4">
            <h2 class="fw-bold mb-4 text-center">Log In</h2>
            
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase opacity-75">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-outline-light w-100 fw-bold mt-3 py-2">
                    Enter The Pile
                </button>
            </form>

            <div class="text-center mt-4 border-top border-secondary pt-3">
                <small class="opacity-75">Don't have an account?</small>
                <br>
                <a href="{% url 'register' %}" class="text-info text-decoration-none fw-bold">Sign up here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
